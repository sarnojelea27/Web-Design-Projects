<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Mynerve&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sunshiney&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Peralta&display=swap" rel="stylesheet">
  <title>ACTIVITY 2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      position: relative;
      top: 20px;
      font-family: "Peralta", serif;
      font-size: 60px;
      color: rgb(255, 255, 255);
      font-weight: bold;
      -webkit-text-stroke: 1px rgb(255, 99, 146);
      text-shadow: 1px 1px 9px rgb(252, 249, 65);
    }
    body {
      font-family: 'Lucida Sans', sans-serif;
      color: rgb(150, 15, 55);
      padding: 20px 28px;
      min-height: 100vh;
      background-image: url("https://i.pinimg.com/originals/10/47/99/1047993b3e830e3e79f765a60829d61c.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .three-space {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 40px;
      margin: 40px 0;
    }
    .two-space {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin: 50px 0;
    }
    .btn-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .Uber-button {
      background-color: rgb(0, 0, 0);
      color: white;
      border: 2px solid white;
      padding: 14px 26px;
      font-size: 16px;
    }
    .Amazon-button {
      background-color: rgb(255,216,20);
      color: rgb(0, 0, 0);
      padding: 12px 50px;
      border-radius: 25px;
      border: none;
      font-size: 16px;
    }
    .GitHub-button {
      background-color: rgb(46,164,79);
      color: rgb(255, 255, 255);
      padding: 12px 20px;
      border-radius: 6px;
      font-weight: bold;
      border: none;
      font-size: 16px;
    }
    .Bootstrap-get {
      background-color: rgb(121,82,179);
      color: rgb(255, 255, 255);
      padding: 12px 20px;
      border-radius: 6px;
      font-weight: bold;
      border: none;
      font-size: 16px;
    }
    .Bootstrap-download {
      background-color: rgb(108,117,125);
      color: rgb(255, 255, 255);
      border: 2px solid rgb(121,82,179);
      padding: 12px 20px;
      border-radius: 5px;
      font-size: 16px;
    }
    .LinkedIn-apply {
      background-color: rgb(10,102,194);
      color: white;
      padding: 14px 30px;
      border-radius: 25px;
      border: none;
      font-weight: bold;
      font-size: 16px;
    }
    .LinkedIn-save {
      background-color: white;
      color: rgb(10,102,194);
      border: 1px solid rgb(10,102,194);
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: bold;
      font-size: 16px;
    }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
    }
    .pagination button {
      border: none;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(145deg, #ffffff, #f84291);
      color: white;
      box-shadow: 0 5px 10px rgba(255,79,155,0.3);
      transition: 0.1s;
    }
    .pagination button:hover {
      transform: scale(1.1);
      background: #f38db1;
    }
    .pagination .active {
      background: #ffc0dc;
      color: #ff4f9b;
      border: 1px solid #ff4f9b;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>₊✩‧₊˚౨ৎ˚₊✩‧₊ ACTIVITY 2 ₊✩‧₊˚౨ৎ˚₊✩‧₊</h1>
  </div>

  <div class="container">
    <div class="three-space">
      <div class="btn-wrapper"><button class="Uber-button">Uber</button></div>
      <div class="btn-wrapper"><button class="Amazon-button">Add to Cart</button></div>
      <div class="btn-wrapper"><button class="GitHub-button">Sign up</button></div>
    </div>

    <div class="two-space">
      <div class="btn-wrapper"><button class="Bootstrap-get">Get started</button></div>
      <div class="btn-wrapper"><button class="Bootstrap-download">Download</button></div>
    </div>

    <div class="two-space">
      <div class="btn-wrapper"><button class="LinkedIn-apply">Apply on company website</button></div>
      <div class="btn-wrapper"><button class="LinkedIn-save">Save</button></div>
    </div>
  </div>

  <div class="pagination">
    <a href="finalACT6.html"><button>Previous</button></a>
    <button class="active">2</button>
    <a href="finalACT3.html"><button>Next</button></a>
  </div>
</body>
</html>
