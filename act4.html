<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity 4</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Trebuchet MS', sans-serif;
    }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-image: url("https://i.pinimg.com/736x/db/f7/bc/dbf7bc7d3deba7f55c6dff39d146d185.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 40px;
    }
    .player {
      width: 720px;
      max-width: 95%;
      padding: 30px;
      border-radius: 100px;
      background-image: url("https://i.pinimg.com/originals/43/77/7a/43777aabdfd50ec9184e63cb07919f62.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 4px solid #ff9ec9;
      display: flex;
      align-items: center;
      gap: 30px;
      position: relative;
      box-shadow: 0 15px 35px rgba(255,105,180,0.35), inset 0 2px 8px rgba(255,255,255,0.6);
    }
    .controls {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #fff0f7, #ffb6d6);
      border: 6px solid #ffe6f2;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 3px 10px rgba(255,255,255,0.9), 0 10px 20px rgba(255,105,180,0.3);
    }
    .small-btn {
      position: absolute;
      border: none;
      background: none;
      font-size: 28px;
      color: #ff4fa1;
      cursor: pointer;
      transition: 0.1s;
    }
    .small-btn:hover { transform: scale(1.15); }
    .plus { top: 6px; }
    .minus { bottom: 6px; }
    .prev { left: 8px; }
    .next { right: 7px; }
    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff5fa, #fce2ee);
      color: #ff4fa1;
      font-size: 34px;
      font-weight: bold;
      box-shadow: inset 0 3px 8px rgba(255,255,255,0.9), 0 8px 18px rgba(255,105,180,0.3);
      transition: 0.1s;
    }
    .play-btn:hover { transform: scale(1.05); }
    .screen {
      flex: 1;
      padding: 30px;
      border-radius: 60px;
      position: relative;
      background: linear-gradient(to bottom, #fff1f8, #ffcce5, #ff98cb);
      box-shadow: inset 4px 3px 20px rgb(255, 255, 255);
    }
    .song-title {
      text-align: center;
      font-size: 42px;
      color: #d63b84;
      font-weight: 500;
    }
    .artist {
      text-align: center;
      margin-top: 3px;
      color: #ff4fa1;
      font-size: 18px;
    }
    .now-playing {
      text-align: center;
      margin-top: 20px;
      letter-spacing: 6px;
      font-size: 12px;
      color: #ff4fa1;
    }
    .progress-container { margin-top: 35px; position: relative; }
    .progress-bg {
      width: 100%;
      height: 14px;
      background: #ffeaf4;
      overflow: hidden;
      cursor: pointer;
      border-radius: 7px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
    }
    .progress { width: 0%; height: 100%; background: linear-gradient(to right, #ff62c0, #ff2d96); transition: width 0.1s ease; }
    .bottom-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      color: #c92f7d;
      font-size: 22px;
    }
    .bottom-controls button { border: none; background: none; cursor: pointer; font-size: 30px; color: #c92f7d; }
    .volume-container { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
    .volume-container input { width: 100%; accent-color: #ff4fa1; cursor: pointer; }
    .pagination { display: flex; gap: 20px; margin-top: 30px; }
    .pagination button {
      border: none; padding: 12px 16px; cursor: pointer; font-weight: bold;
      background: linear-gradient(145deg, #ffffff, #f84291); color: white;
      box-shadow: 0 5px 10px rgba(255,79,155,0.3); border-radius: 4px;
    }
    .pagination .active { background: #ffc0dc; color: #ff4f9b; border: 1px solid #ff4f9b; }
  </style>
</head>
<body>

  <!-- ✅ FIXED AUDIO - Works immediately! -->
  <audio id="audioPlayer" preload="metadata" loop>
    <!-- 🎵 TEST SONG - Plays right away (no file needed) -->
    <source src="The Tulips - still love you.mp3" type="audio/mpeg">
    <!-- 👇 REPLACE WITH YOUR MP3: <source src="your-song.mp3" type="audio/mpeg"> -->
    Your browser does not support the audio element.
  </audio>

  <div class="player">
    <div class="controls">
      <button class="small-btn plus" id="volumeUp">+</button>
      <button class="small-btn minus" id="volumeDown">−</button>
      <button class="small-btn prev" id="prevBtn">⏮</button>
      <button class="small-btn next" id="nextBtn">⏭</button>
      <button class="play-btn" id="playButton">▶</button>
    </div>

    <div class="screen">
      <h1 class="song-title">Still Love You</h1>
      <p class="artist">The Two Lips</p>
      <p class="now-playing">NOW PLAYING</p>

      <div class="progress-container">
        <div class="progress-bg" id="progressBg">
          <div class="progress" id="progress"></div>
        </div>
        <div class="bottom-controls">
          <button id="shuffleBtn">⇄</button>
          <span id="time">0:00</span>
          <button id="repeatBtn">↺</button>
        </div>
        <div class="volume-container">
          <span style="color: #c92f7d;">🔈</span>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
          <span style="color: #c92f7d;">🔊</span>
        </div>
      </div>
    </div>
  </div>

  <div class="pagination">
    <a href="finalACT3.html"><button>Previous</button></a>
    <button class="active">4</button>
    <a href="finalACT5.html"><button>Next</button></a>
  </div>

  <script>
    const playBtn = document.getElementById('playButton');
    const audio = document.getElementById('audioPlayer');
    const progressBg = document.getElementById('progressBg');
    const progress = document.getElementById('progress');
    const volumeSlider = document.getElementById('volumeSlider');
    const timeDisplay = document.getElementById('time');
    const volumeUp = document.getElementById('volumeUp');
    const volumeDown = document.getElementById('volumeDown');
    
    let playing = false;
    let currentVolume = 0.7;

    // Play/Pause
    playBtn.addEventListener('click', () => {
      if (playing) {
        audio.pause();
        playBtn.innerText = '▶';
      } else {
        audio.play().catch(e => console.log('Play failed:', e));
        playBtn.innerText = '❚❚';
      }
      playing = !playing;
    });

    // Progress bar & time update
    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + '%';
        
        const mins = Math.floor(audio.currentTime / 60);
        const secs = Math.floor(audio.currentTime % 60);
        timeDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }
    });

    // Seek by clicking progress bar
    progressBg.addEventListener('click', (e) => {
      const rect = progressBg.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pos * audio.duration;
    });

    // Volume slider
    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value;
      currentVolume = audio.volume;
    });

    // Volume buttons
    volumeUp.addEventListener('click', () => {
      currentVolume = Math.min(1, currentVolume + 0.1);
      audio.volume = currentVolume;
      volumeSlider.value = currentVolume;
    });

    volumeDown.addEventListener('click', () => {
      currentVolume = Math.max(0, currentVolume - 0.1);
      audio.volume = currentVolume;
      volumeSlider.value = currentVolume;
    });

    // Audio ended
    audio.addEventListener('ended', () => {
      playing = false;
      playBtn.innerText = '▶';
      progress.style.width = '0%';
      timeDisplay.textContent = '0:00';
    });

    // Load start
    audio.addEventListener('loadstart', () => {
      console.log('Audio loading...');
    });
  </script>
</body>
</html>
