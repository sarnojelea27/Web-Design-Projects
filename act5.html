<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Mynerve&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sunshiney&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Peralta&display=swap" rel="stylesheet">
    <title>Activity 5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("https://i.pinimg.com/originals/5d/88/5b/5d885b02b804c7f90a5b855aa01d89af.gif") center/cover;
            opacity: 0.1;
            z-index: -1;
        }
        .box {
            width: 95%;
            max-width: 1400px;
            background: rgba(248, 220, 226, 0.95);
            backdrop-filter: blur(10px);
            border: 3px solid #000000;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 15px;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #ff6b9d);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            border-bottom: 3px solid black;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        nav a {
            text-decoration: none;
            color: white;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            font-family: "Mynerve", cursive;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            transition: all 0.3s ease;
            border: 2px solid white;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        nav a:hover {
            transform: scale(1.1) translateY(-2px);
            background: rgba(255,255,255,0.4);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hero {
            /* ✅ CHANGED: Stack vertically - Text on top, images below */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 50px;
            gap: 60px;
            background: linear-gradient(135deg, rgba(255,77,125,0.9), rgba(255,105,180,0.9));
            border-radius: 0 0 12px 12px;
            text-align: center;
        }
        .left {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .left h1 {
            font-family: "Peralta", serif;
            font-size: clamp(40px, 8vw, 70px);
            line-height: 1;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 3px 3px 0px #000, 1px 1px 0px #ff4d7d;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 3px 3px 0px #000, 1px 1px 0px #ff4d7d; }
            to { text-shadow: 3px 3px 20px #ff4d7d, 0 0 30px #ff4d7d; }
        }
        .arc-text {
            position: relative;
            height: 100px;
            margin: 20px 0 40px 0;
            color: #fff;
            font-size: 32px;
            font-family: "Sunshiney", cursive;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .arc-text span {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) rotateX(20deg);
            white-space: nowrap;
        }
        .left p {
            color: #fff;
            margin-bottom: 35px;
            font-family: "Mynerve", cursive;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn button {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: #fff;
            border: 3px solid #000;
            padding: 15px 30px;
            font-family: "Mynerve", cursive;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        .btn button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255,77,125,0.5);
            background: linear-gradient(45deg, #ff4d7d, #ff6b9d);
        }
        .btn button:active {
            transform: translateY(-2px);
        }
        
        /* ✅ IMAGES BELOW TEXT */
        .right-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1000px;
        }
        .right-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 5px solid #000;
            border-radius: 20px;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .right-grid img:hover {
            transform: scale(1.08) rotate(3deg);
            box-shadow: 0 20px 40px rgba(255,77,125,0.6);
            border-color: #ff4d7d;
        }
        .pagination {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            z-index: 10;
        }
        .pagination button {
            border: none; 
            padding: 14px 24px; 
            cursor: pointer; 
            font-weight: bold;
            font-family: "Mynerve", cursive;
            background: linear-gradient(145deg, #ffffff, #f84291); 
            color: white;
            box-shadow: 0 8px 20px rgba(255,79,155,0.4);
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .pagination button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,79,155,0.6);
        }
        .pagination .active { 
            background: linear-gradient(145deg, #ffc0dc, #ff4f9b); 
            color: #fff; 
            border: 3px solid #ff4f9b; 
            box-shadow: 0 0 25px rgba(255,79,155,0.8);
        }
        
        /* ✅ Perfect Mobile */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 25px;
                gap: 40px;
            }
            .btn {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .btn button {
                min-width: 250px;
                padding: 18px 30px;
                font-size: 20px;
            }
            .right-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            nav {
                gap: 12px;
                padding: 12px;
            }
            nav a {
                font-size: 14px;
                padding: 8px 14px;
            }
        }
        @media (max-width: 480px) {
            .right-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .hero {
                padding: 30px 20px;
            }
            .left h1 {
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="box">
        <nav>
            <a href="#">🏠 HOME</a>
            <a href="#">ℹ️ ABOUT</a>
            <a href="#">📝 BLOG</a>
            <a href="#">✉️ CONTACT</a>
        </nav>

        <div class="hero">
            <!-- ✅ TEXT SECTION (TOP) -->
            <div class="left">
                <div class="arc-text">
                    <span>CERTIFIED HAPPY ✨</span>
                </div>
                <h1>BE HAPPY!</h1>
                <p>TO MAKE IT BETTER, WHY DON'T YOU...</p>
                <div class="btn">
                    <button onclick="alert('☕ Enjoy your coffee break! ☕')">☕ HAVE COFFEE</button>
                    <button onclick="alert('🎶 Time for your favorite tunes! 🎶')">🎶 LISTEN TO MUSIC</button>
                    <button onclick="alert('💥 Adventure awaits! Let\'s explore! 💥')">💥 EXPLORE ACTIVITIES</button>
                </div>
            </div>

            <!-- ✅ IMAGE GRID (BELOW TEXT) -->
            <div class="right-grid">
                <img src="https://i.pinimg.com/originals/5d/88/5b/5d885b02b804c7f90a5b855aa01d89af.gif" alt="Coffee Vibes" loading="lazy">
                <img src="https://i.pinimg.com/originals/f6/8f/d7/f68fd718cc33d069f8494af14414c47e.gif" alt="Music Magic" loading="lazy">
                <img src="https://i.pinimg.com/originals/88/26/66/882666aa491b2fdc94315672ddeeb8e6.gif" alt="Dance Party" loading="lazy">
                <img src="https://i.pinimg.com/originals/db/39/be/db39bedb96263005c6d1d44701bc5795.gif" alt="Pure Joy" loading="lazy">
                <img src="https://i.pinimg.com/originals/f6/09/94/f60994cc3e86a7f59d9d09843a25818f.gif" alt="Love Hearts" loading="lazy">
                <img src="https://i.pinimg.com/originals/cb/7c/8a/cb7c8ab7445feb40d923c33155390a31.gif" alt="Ultimate Happiness" loading="lazy">
            </div>
        </div>
    </div>

    <div class="pagination">
        <a href="finalACT4.html"><button>← Previous</button></a>
        <button class="active">5</button>
        <a href="finalACT6.html"><button>Next →</button></a>
    </div>

</body>
</html>
