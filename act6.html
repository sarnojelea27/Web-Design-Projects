<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Mynerve&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sunshiney&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Peralta&display=swap" rel="stylesheet">
    <title>Activity 6</title>
    <style>
         body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url("https://i.pinimg.com/originals/03/c2/ff/03c2ff2e06cd871731d8e96fd1113b34.gif");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: "Mynerve", cursive;
        }
        .blog-card {
            width: 650px;
            max-width: 90%;
            background: rgba(255, 79, 161, 0.8);
            border: 2px solid rgb(252, 252, 137);
            border-radius: 35px;
            padding: 30px;
        }
        .stars {
            text-align: center;
            font-size: 20px;
            color: rgb(252, 252, 137);
            margin-bottom: 10px;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .small-text {
            display: block;
            font-size: 32px;
            font-family: "Mynerve", cursive;
            color: rgb(252, 252, 137);
            text-shadow: 2px 2px 0px black;
        }
        .big-text {
            display: block;
            font-size: 55px;
            font-family: "Peralta", serif;
            color: rgb(255, 255, 255);
            -webkit-text-stroke: 1px rgb(155, 219, 245);
            text-shadow: 3px 3px 0px black;
        }
        .content {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .image-box {
            flex: 1;
            min-width: 200px;
            height: 210px;
            border: 5px solid rgb(252, 252, 137);
            border-radius: 15px;
            overflow: hidden;
            background-image: url("https://i.pinimg.com/originals/9b/d8/90/9bd89050c9b149dfda7bc46e9782fd04.gif");
            background-size: cover;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-section {
            flex: 1;
            min-width: 240px;
        }
        .input-box {
            display: flex;
            align-items: center;
            background: rgb(252, 252, 137);
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid rgb(131, 128, 128);
            box-shadow: 2px 2px 0px black;
        }
        .input-box input {
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            padding-left: 10px;
            font-size: 16px;
        }
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .remember-forgot a { color: black; text-decoration: none; font-weight: bold; }
        .btn {
            width: 100%;
            padding: 10px;
            background: #ffc0dc;
            border: 2px solid black;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .pagination { display: flex; gap: 20px; margin-top: 30px; }
        .pagination button {
            border: none; padding: 12px 16px; cursor: pointer; font-weight: bold;
            background: linear-gradient(145deg, #ffffff, #f84291); color: white;
        }
    </style>
</head>
<body>

<div class="blog-card">
    <div class="stars">★ ★ ★ ★ ★ ★ ★ ★ ★</div>
    <div class="title">
        <span class="small-text">Welcome to My</span>
        <span class="big-text">BLOG! ✮⋆˙</span>
    </div>
    
    <div class="content">
        <div class="image-box">
            <img src="PNGS/CHARACTER-01.png" alt="Character">
        </div>
                
        <form class="login-section" action="finalACT5.html">
            <div class="input-box">
          
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">
               
                <input type="🔒password" placeholder="Password" required>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</div>

<div class="pagination">
    <a href="finalACT5.html"><button>Previous</button></a>
    <button style="background:#ffc0dc; color: #ff4f9b;">6</button>
    <a href="finalACT7.html"><button>Next (Master)</button></a>
</div>

</body>
</html>
