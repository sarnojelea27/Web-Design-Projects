<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Mynerve&family=Sunshiney&family=Peralta&display=swap" rel="stylesheet">
<title>Activity 7 - Master Portal</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
        font-family:'Trebuchet MS', Arial, sans-serif; 
        background: linear-gradient(135deg, #1a0033 0%, #2d004d 50%, #440088 100%); 
        color: #fff; 
        overflow-x: hidden;
    }
    
    .page { 
        display: none; 
        width: 100%; 
        min-height: 100vh; 
        padding: 60px 20px; 
        position: relative;
    }
    .page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: inherit;
        filter: brightness(0.7) blur(1px);
        z-index: -1;
    }
    .active-page { display: flex; flex-direction: column; justify-content: center; align-items: center; }

    /* Enhanced Page Backgrounds */
    #page1 { 
        background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e), 
                    url("PNGS/pink anime flowers.gif"); 
        background-size: cover, cover; 
        background-position: center; 
        animation: shimmer 8s ease-in-out infinite;
    }
    
    #page2 { 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: relative;
    }
    #page2::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%);
        pointer-events: none;
    }
    
    #page3 { 
        background: linear-gradient(45deg, #ffecd2 0%, #fcb69f 25%, #a8edea 50%, #fed6e3 75%, #ff9a9e 100%),
                    url("Pink wallpapers.jpg"); 
        background-size: cover, cover; 
    }
    
    #page4 { 
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab),
                    url("killthemwithcuteness.gif"); 
        background-size: cover, cover; 
        animation: gradientShift 15s ease infinite;
    }

    #page5 { 
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%),
                    url("gif2.gif"); 
        background-size: cover, cover; 
    }

    @keyframes shimmer {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
    }
    
    @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    /* Enhanced Components */
    .master-card { 
        background: rgba(255, 255, 255, 0.15); 
        backdrop-filter: blur(20px);
        border: 2px solid rgba(255, 252, 137, 0.4);
        border-radius: 30px; 
        padding: 40px; 
        width: 650px; 
        max-width: 95%; 
        color: white; 
        box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        position: relative;
        overflow: hidden;
    }
    .master-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
        transform: rotate(45deg);
        transition: all 0.6s;
    }
    .master-card:hover::before {
        animation: shine 1.5s infinite;
    }
    @keyframes shine {
        0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
        100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .btn-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
        gap: 25px; 
        width: 85%; 
        max-width: 850px; 
        margin: 30px 0; 
    }
    
    .styled-btn { 
        padding: 18px 24px; 
        font-weight: 700; 
        font-size: 16px;
        cursor: pointer; 
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 15px; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .styled-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s;
    }
    
    .styled-btn:hover::before {
        left: 100%;
    }
    
    .styled-btn:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    /* Typography */
    h1, h2, h3 { font-family: 'Peralta', cursive; }
    h1 { font-size: 3.5em; margin-bottom: 20px; text-align: center; }
    h2 { font-size: 2.5em; margin-bottom: 25px; text-align: center; }
    h3 { font-size: 1.8em; margin-bottom: 15px; }

    /* Audio Player */
    .audio-container {
        text-align: center;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 30px;
        border: 1px solid rgba(255,255,255,0.2);
    }
    #playButton {
        background: linear-gradient(45deg, #ff6b9d, #c44569);
        border-radius: 50%;
        width: 80px; 
        height: 80px; 
        font-size: 24px; 
        color: white;
        margin: 20px 0;
        box-shadow: 0 10px 30px rgba(255,107,157,0.4);
    }
    #volumeSlider {
        width: 85%;
        height: 8px;
        border-radius: 10px;
        background: rgba(255,255,255,0.2);
        outline: none;
        -webkit-appearance: none;
    }
    #volumeSlider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background: #ff6b9d;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(255,107,157,0.5);
    }

    /* Pagination - Sleek Design */
    .pagination-container {
        position: fixed; 
        bottom: 20px; 
        left: 50%; 
        transform: translateX(-50%);
        background: rgba(0,0,0,0.9); 
        backdrop-filter: blur(25px);
        padding: 20px 30px; 
        border-radius: 50px;
        border: 2px solid rgba(255,252,137,0.3);
        display: flex; 
        justify-content: center; 
        align-items: center; 
        gap: 20px; 
        z-index: 9999;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    
    .pagination-container button {
        min-width: 50px;
        padding: 12px 20px; 
        background: linear-gradient(45deg, #ff4f9b, #ff6b9d); 
        color: white; 
        border: none; 
        font-weight: 700; 
        cursor: pointer; 
        border-radius: 25px;
        font-size: 16px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    
    .pagination-container button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255,79,155,0.4);
    }
    
    .pagination-container button.active { 
        background: linear-gradient(45deg, #fff, #f0f0f0); 
        color: #ff4f9b; 
        box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
        font-size: 18px;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .master-card { padding: 25px; width: 95%; }
        .btn-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
        h1 { font-size: 2.5em; }
        h2 { font-size: 2em; }
        .pagination-container { padding: 15px 20px; gap: 10px; }
    }
</style>
</head>
<body>

  <div id="page1" class="page active-page">
     <div class="master-card">
         <h2>PORTAL ACCESS</h2>
         <p style="text-align: center; margin: 20px 0 30px; font-size: 1.2em; opacity: 0.9;">Authenticate to unlock the experimental interface</p>
         <button class="styled-btn" style="width: 100%; background: linear-gradient(45deg, #fcfc89, #f4f485); color: #333; font-size: 18px;" onclick="showPage(2)">
             🔐 Secure Entry
         </button>
     </div>
  </div>

  <div id="page2" class="page">
      <h1>DASHBOARD HUB</h1>
      <p style="font-size: 1.3em; text-align: center; max-width: 600px; margin: 0 auto 40px; opacity: 0.9;">Centralized control center for all integrated components</p>
  </div>

  <div id="page3" class="page">
      <div class="master-card audio-container">
          <h3>🎵 NOW PLAYING</h3>
          <h1>Still Love You</h1>
          <audio id="audio" src="song.mp3"></audio>
          <button id="playButton" class="styled-btn">▶</button>
          <div style="margin-top: 25px;">
              <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
          </div>
      </div>
  </div>

  <div id="page4" class="page">
      <h2>INTERACTIVE MATRIX</h2>
      <div class="btn-grid">
          <button class="styled-btn" style="background: linear-gradient(45deg, #000, #333);">🚗 Uber</button>
          <button class="styled-btn" style="background: linear-gradient(45deg, #ffd814, #ffcc00); color: #333;">📦 Amazon</button>
          <button class="styled-btn" style="background: linear-gradient(45deg, #2ea44f, #1e8a30);">💻 GitHub</button>
      </div>
  </div>

  <div id="page5" class="page">
      <h2>CORE ACTIONS</h2>
      <div class="btn-grid">
          <button class="styled-btn" style="background: linear-gradient(45deg, #000, #333);">🚗 Uber</button>
          <button class="styled-btn" style="background: linear-gradient(45deg, #ffd814, #ffcc00); color: #333;">📦 Amazon</button>
          <button class="styled-btn" style="background: linear-gradient(45deg, #2ea44f, #1e8a30);">💻 GitHub</button>
      </div>
  </div>

  <div class="pagination-container">
      <button onclick="navigate(-1)">⏮ Prev</button>
      <div id="pageNumbers" style="display: inline-flex; gap: 12px;"></div>
      <button onclick="navigate(1)">Next ⏭</button>
  </div>

<script>
    let currentPage = 1;
    const totalPages = 5;

    function showPage(pageNumber) {
        if(pageNumber < 1 || pageNumber > totalPages) return;
        currentPage = pageNumber;
        
        document.querySelectorAll('.page').forEach(page => {
            page.classList.remove('active-page');
        });
        document.getElementById('page' + currentPage).classList.add('active-page');
        renderPagination();
    }

    function navigate(direction) {
        showPage(currentPage + direction);
    }

    function renderPagination() {
        const container = document.getElementById('pageNumbers');
        container.innerHTML = '';
        for(let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            if(i === currentPage) btn.classList.add('active');
            btn.onclick = () => showPage(i);
            container.appendChild(btn);
        }
    }

    // Enhanced Audio Controls
    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const volumeSlider = document.getElementById("volumeSlider");
    let isPlaying = false;

    playButton.addEventListener("click", () => {
        if(isPlaying){
            audio.pause();
            playButton.innerHTML = "▶";
            playButton.style.background = "linear-gradient(45deg, #ff6b9d, #c44569)";
        } else {
            audio.play().catch(() => console.log("Audio file required for playback"));
            playButton.innerHTML = "⏸";
            playButton.style.background = "linear-gradient(45deg, #667eea, #764ba2)";
        }
        isPlaying = !isPlaying;
    });

    volumeSlider.addEventListener("input", () => {
        audio.volume = volumeSlider.value;
    });

    renderPagination();
</script>
</body>
</html>
